version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dotnet_payments_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  paymentsapi:
    image: paymentsapi:latest
    container_name: dotnet_payments_api
    build:
      context: .
      dockerfile: PaymentsAPI/Dockerfile
    ports:
      - "8090:8090"
      - "8091:8091"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Url=amqp://guest:guest@dotnet_payments_rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:

